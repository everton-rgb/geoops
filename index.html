<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0F2E4D" />
    <meta name="description" content="GeoópS — Inteligência Operacional para Gestão de Projetos Ambientais · GEOAMBIENTE S/A" />

    <!-- PWA / iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GeoópS" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Fontes IBM Plex -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;800&family=IBM+Plex+Serif:wght@600&family=IBM+Plex+Mono&display=swap" rel="stylesheet" />

    <title>GeoópS · GEOAMBIENTE S/A</title>
    <style>
      html, body, #root { margin: 0; padding: 0; min-height: 100%; }
      body { font-family: 'IBM Plex Sans', system-ui, sans-serif; background: #F4F7FA; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      /* GeoópS Mobile como APP INDEPENDENTE: quem visita /mobile instala o PWA próprio
         (manifest com id/start_url /mobile) — janela separada do GeoópS. */
      (function () {
        var m = /^\/mobile/.test(location.pathname) || /#\/?(mobile|geofields)/i.test(location.hash);
        if (!m) return;
        function troca() {
          var l = document.querySelector('link[rel="manifest"]');
          if (l) l.setAttribute("href", "/manifest-mobile.webmanifest");
          else {
            l = document.createElement("link"); l.rel = "manifest"; l.href = "/manifest-mobile.webmanifest";
            document.head.appendChild(l);
          }
        }
        if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", troca); else troca();
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
